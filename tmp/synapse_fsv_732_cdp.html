<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Synapse FSV 732 CDP</title>
  <style>
    body { font: 16px system-ui, sans-serif; padding: 24px; }
    button { font-size: 18px; padding: 10px 16px; }
    output { display: block; margin-top: 16px; font-weight: 700; }
  </style>
</head>
<body>
  <button id="synapse-fsv-732-cdp-button"
          aria-label="Synapse FSV 732 CDP increment"
          onclick="window.synapseFsvCount=(window.synapseFsvCount||0)+1; document.getElementById('synapse-fsv-732-cdp-count').textContent='count=' + window.synapseFsvCount;">
    Increment
  </button>
  <output id="synapse-fsv-732-cdp-count">count=0</output>
</body>
</html>
