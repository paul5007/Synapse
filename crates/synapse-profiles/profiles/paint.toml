id = "paint"
label = "Microsoft Paint"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "mspaint.exe"
title_regex = ".* - Paint$"

[[matches]]
exe = "mspaint.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
new_file = "ctrl+n"
open = "ctrl+o"
paste = "ctrl+v"
redo = "ctrl+y"
save = "ctrl+s"
select_all = "ctrl+a"
undo = "ctrl+z"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p2"
"registry.quality_signal" = "profile_quality.paint"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_click,act_stroke,act_press,storage_inspect,profile_quality_refresh,paint_window_title_readback"
"registry.compatibility_target" = "paint.windows"
"registry.safe_default_backend_policy" = "auto; local productivity only; drawing uses act_click/act_stroke on the canvas; no remote execution; audit export requires explicit consent"
"action.save_key" = "ctrl+s"
"action.canvas_drawing" = "act_stroke with a line path/button hold and natural velocity over the canvas region"
