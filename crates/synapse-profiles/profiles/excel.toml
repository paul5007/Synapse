id = "excel"
label = "Microsoft Excel"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "EXCEL.EXE"
title_regex = ".* - Excel$"

[[matches]]
exe = "EXCEL.EXE"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
cut = "ctrl+x"
edit_cell = "f2"
find = "ctrl+f"
goto = "ctrl+g"
new_file = "ctrl+n"
open = "ctrl+o"
paste = "ctrl+v"
print = "ctrl+p"
redo = "ctrl+y"
save = "ctrl+s"
save_as = "f12"
select_all = "ctrl+a"
undo = "ctrl+z"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.quality_signal" = "profile_quality.excel"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_type,act_press,act_click,storage_inspect,profile_quality_refresh,excel_cell_value_readback"
"registry.compatibility_target" = "excel.windows"
"registry.safe_default_backend_policy" = "auto; local productivity only; no account/license changes; no remote execution; audit export requires explicit consent"
"action.save_key" = "ctrl+s"
"action.edit_cell_key" = "f2"
"action.act_type_text_integrity" = "dispatch_only_requires_target_readback"
