id = "zoom"
label = "Zoom"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "Zoom.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
mute_toggle = "alt+a"
video_toggle = "alt+v"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p2"
"registry.quality_signal" = "profile_quality.zoom"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_press,act_click,storage_inspect,profile_quality_refresh,zoom_window_title_readback"
"registry.compatibility_target" = "zoom.windows"
"registry.safe_default_backend_policy" = "auto; local productivity/communication; JOINING/STARTING meetings is an outward-facing action that must be operator-confirmed; no account/credential changes; audit export requires explicit consent"
"action.mute_toggle_key" = "alt+a"
"action.outward_facing_actions" = "join_meeting,start_meeting; require explicit operator confirmation before dispatch"
