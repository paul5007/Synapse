id = "iexplore"
label = "Internet Explorer"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "iexplore.exe"
title_regex = ".* - Internet Explorer$"

[[matches]]
exe = "iexplore.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
address_bar = "ctrl+l"
back = "alt+left"
find = "ctrl+f"
forward = "alt+right"
new_tab = "ctrl+t"
reload = "f5"
switch_tab_left = "ctrl+shift+tab"
switch_tab_right = "ctrl+tab"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p2"
"registry.quality_signal" = "profile_quality.iexplore"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_clipboard,act_press,storage_inspect,profile_quality_refresh,browser_window_title_readback"
"registry.compatibility_target" = "iexplore.windows"
"registry.safe_default_backend_policy" = "auto; local productivity/browser navigation only; no credential/payment/account changes; no remote execution; audit export requires explicit consent"
"runtime.iexplore.configured_host_status" = "ie11_desktop_app_retired_and_may_redirect_to_microsoft_edge_on_modern_windows"
"runtime.iexplore.evidence_policy" = "do_not_claim_iexplore_profile_launch_until_iexplore_exe_process_window_sot_readback"
"runtime.iexplore.redirect_source_url" = "https://learn.microsoft.com/en-us/windows/whats-new/removed-features"
"action.address_bar_key" = "ctrl+l"
"action.navigation_text_entry_verified_path" = "act_press ctrl+l + act_clipboard write + ctrl+v paste + enter + browser_window_title_readback"
