id = "teams"
label = "Microsoft Teams"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "ms-teams.exe"

[[matches]]
exe = "Teams.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
goto_search = "ctrl+e"
mute_toggle = "ctrl+shift+m"
new_chat = "ctrl+n"
paste = "ctrl+v"
send_message = "enter"
video_toggle = "ctrl+shift+o"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.quality_signal" = "profile_quality.teams"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_type,act_press,act_click,storage_inspect,profile_quality_refresh,teams_window_title_readback"
"registry.compatibility_target" = "teams.windows"
"registry.safe_default_backend_policy" = "auto; local productivity/communication; SENDING messages and joining/starting calls are outward-facing actions that must be operator-confirmed; no account/credential changes; audit export requires explicit consent"
"action.goto_search_key" = "ctrl+e"
"action.outward_facing_actions" = "send_message,start_call,join_call; require explicit operator confirmation before dispatch"
