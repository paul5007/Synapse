id = "photos"
label = "Microsoft Photos"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

# Modern WinUI Photos runs as Photos.exe (package Microsoft.Windows.Photos),
# not the legacy Microsoft.Photos.exe and not hosted by ApplicationFrameHost.
[[matches]]
exe = "Photos.exe"

[[matches]]
exe = "Microsoft.Photos.exe"

[[matches]]
exe = "ApplicationFrameHost.exe"
title_regex = "^Photos$"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
delete = "delete"
next = "right"
previous = "left"
rotate = "ctrl+r"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p3"
"registry.quality_signal" = "profile_quality.photos"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_press,act_click,storage_inspect,profile_quality_refresh,photos_window_title_readback"
"registry.compatibility_target" = "photos.windows"
"registry.safe_default_backend_policy" = "auto; local media viewing; DELETE removes files and must be operator-confirmed; no remote execution; audit export requires explicit consent"
"action.irreversible_actions" = "delete; require explicit operator confirmation before dispatch"
