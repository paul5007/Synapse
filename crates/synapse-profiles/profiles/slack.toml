id = "slack"
label = "Slack"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "slack.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
jump_to = "ctrl+k"
paste = "ctrl+v"
search = "ctrl+f"
send_message = "enter"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.quality_signal" = "profile_quality.slack"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_type,act_press,act_click,storage_inspect,profile_quality_refresh,slack_window_title_readback"
"registry.compatibility_target" = "slack.windows"
"registry.safe_default_backend_policy" = "auto; local productivity/communication; SENDING messages is an outward-facing action that must be operator-confirmed; no account/credential changes; audit export requires explicit consent"
"action.jump_to_key" = "ctrl+k"
"action.outward_facing_actions" = "send_message; require explicit operator confirmation before dispatch"
