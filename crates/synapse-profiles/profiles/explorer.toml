id = "explorer"
label = "Windows File Explorer"
schema_version = 2
use_scope = "productivity"
mode = "a11y_only"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "explorer.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
address_bar = "alt+d"
copy = "ctrl+c"
cut = "ctrl+x"
delete = "delete"
new_folder = "ctrl+shift+n"
open = "enter"
paste = "ctrl+v"
properties = "alt+enter"
rename = "f2"
search = "ctrl+f"
select_all = "ctrl+a"
up_one_level = "alt+up"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.quality_signal" = "profile_quality.explorer"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_press,act_click,act_type,storage_inspect,profile_quality_refresh,explorer_address_bar_readback,explorer_selection_readback"
"registry.compatibility_target" = "explorer.windows"
"registry.safe_default_backend_policy" = "auto; local file navigation/management; DELETE/rename/move are irreversible filesystem actions that must be operator-confirmed; no remote execution; audit export requires explicit consent"
"action.rename_key" = "f2"
"action.address_bar_key" = "alt+d"
"action.irreversible_actions" = "delete,permanent_delete,rename,move; require explicit operator confirmation before dispatch"
