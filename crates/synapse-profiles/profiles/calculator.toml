id = "calculator"
label = "Windows Calculator"
schema_version = 2
use_scope = "productivity"
mode = "a11y_only"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "CalculatorApp.exe"

[[matches]]
exe = "Calculator.exe"

[[matches]]
exe = "ApplicationFrameHost.exe"
title_regex = "^Calculator$"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
clear = "escape"
copy = "ctrl+c"
equals = "enter"
paste = "ctrl+v"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p2"
"registry.quality_signal" = "profile_quality.calculator"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_press,act_click,storage_inspect,profile_quality_refresh,calculator_display_readback"
"registry.compatibility_target" = "calculator.windows"
"registry.safe_default_backend_policy" = "auto; local productivity only; no remote execution; audit export requires explicit consent"
"action.equals_key" = "enter"
"action.display_readback" = "calculator result display via UIA value readback"
