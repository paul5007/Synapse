id = "onenote"
label = "Microsoft OneNote"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "ONENOTE.EXE"
title_regex = ".* - OneNote$"

[[matches]]
exe = "ONENOTE.EXE"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
cut = "ctrl+x"
find = "ctrl+f"
new_page = "ctrl+n"
paste = "ctrl+v"
redo = "ctrl+y"
search_all = "ctrl+e"
select_all = "ctrl+a"
undo = "ctrl+z"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p2"
"registry.quality_signal" = "profile_quality.onenote"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_type,act_press,storage_inspect,profile_quality_refresh,onenote_page_text_readback"
"registry.compatibility_target" = "onenote.windows"
"registry.safe_default_backend_policy" = "auto; local productivity only; no account changes; no remote execution; audit export requires explicit consent"
"action.new_page_key" = "ctrl+n"
"action.act_type_text_integrity" = "dispatch_only_requires_target_readback"
