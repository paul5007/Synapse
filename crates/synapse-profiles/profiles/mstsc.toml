id = "mstsc"
label = "Remote Desktop Connection"
schema_version = 2
use_scope = "productivity"
mode = "a11y_only"
mouse_velocity_profile_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "mstsc.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
paste = "ctrl+v"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p2"
"registry.quality_signal" = "profile_quality.mstsc"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_press,act_click,storage_inspect,profile_quality_refresh,mstsc_window_title_readback"
"registry.compatibility_target" = "mstsc.windows"
"registry.safe_default_backend_policy" = "auto; local Remote Desktop client navigation; CONNECTING to a remote host drives a second machine the operator must be authorized to control and must be operator-confirmed; credentials must not be automated; audit export requires explicit consent"
"action.outward_facing_actions" = "connect_to_host; require explicit operator confirmation before dispatch"
