# Workspace Clippy configuration.
#
# `clippy::unwrap_used` and `clippy::expect_used` are denied workspace-wide
# (see [workspace.lints.clippy] in Cargo.toml) to keep PRODUCTION paths free of
# panicking unwraps. Test code throughout the workspace legitimately uses
# `unwrap()`/`expect()`/`unwrap_err()`/`expect_err()` to assert invariants, so
# allow them in `#[cfg(test)]` / `#[test]` contexts only. Production code remains
# strict.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
